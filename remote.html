<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilot Karaoke</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        button { background: #333; color: white; border: 2px solid #bb86fc; padding: 25px; border-radius: 15px; font-size: 18px; font-weight: bold; }
        button:active { background: #bb86fc; color: black; transform: scale(0.95); }
        .full { grid-column: span 2; background: #bb86fc; color: black; }
        .sfx { border-color: #03dac6; font-size: 14px; }
    </style>
</head>
<body>
    <h3>STEROWANIE DJ</h3>
    <div class="grid">
        <button class="full" onclick="sendCmd('play')">PLAY / PAUSE ⏯️</button>
        <button onclick="sendCmd('prev')">POPRZEDNI ⏮️</button>
        <button onclick="sendCmd('next')">NASTĘPNY ⏭️</button>
        <button class="full" onclick="sendCmd('fullscreen')">PEŁNY EKRAN 📺</button>
        <button class="sfx" onclick="sendCmd('sfx', 'brawa')">BRAWA 👏</button>
        <button class="sfx" onclick="sendCmd('sfx', 'smiech')">ŚMIECH 😂</button>
    </div>

    <script>
        // TUTAJ WKLEJ SWOJE DANE Z FIREBASE
        const firebaseConfig = {
            apiKey: "TWÓJ_KLUCZ",
            databaseURL: "TWÓJ_URL_BAZY",
            projectId: "TWÓJ_ID",
            appId: "TWÓJ_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function sendCmd(action, val = null) {
            db.ref('remote_cmd').set({
                action: action,
                value: val,
                ts: Date.now() // Timestamp wymusza reakcję laptopa na każde kliknięcie
            });
        }
    </script>
</body>
</html>
