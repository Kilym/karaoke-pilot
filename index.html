<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pilot DJ'a - Diagnostyka</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #000000;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            user-select: none;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        #debugBar {
            background: #333;
            color: #ffeb3b;
            font-family: monospace;
            font-size: 3.5vw;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            word-wrap: break-word;
        }

        .status-display { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .mode-label { color: #bb86fc; font-size: 4vw; margin-bottom: 10px; }
        .huge-title { font-size: 10vw; font-weight: bold; margin: 5px 0; color: #ffffff; }
        .bottom-panel { padding-bottom: env(safe-area-inset-bottom); }
        .controls-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
        .btn { background: #1e1e1e; border: none; color: white; padding: 25px 0; border-radius: 16px; font-size: 30px; display: flex; align-items: center; justify-content: center; transition: 0.1s; }
        .btn-play { background: #455a64; font-size: 40px; }
        .btn.pressed { background: #e53935 !important; transform: scale(0.95); }
        .btn:disabled { opacity: 0.4; pointer-events: none; }
    </style>
</head>

<body>

    <div id="debugBar">DEBUG: Czekam na wciśnięcie przycisku...</div>

    <div class="status-display">
        <div id="uiMode" class="mode-label">Inicjalizacja...</div>
        <div id="uiSubDisplay" class="huge-title">Czekam na dane</div>
    </div>

    <div id="uiControlPanel" class="bottom-panel">
        <div class="controls-grid">
            <button id="btnPrev" class="btn" onclick="sendCmd('prev')">⏮️</button>
            <button id="btnPlay" class="btn btn-play" onclick="sendCmd('play')">▶️</button>
            <button id="btnNext" class="btn" onclick="sendCmd('next')">⏭️</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA7Eam7DIBhHG05gBTNGWuFLs2W8eLfqUo",
            authDomain: "indeksowe-karaoke.firebaseapp.com",
            databaseURL: "https://indeksowe-karaoke-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "indeksowe-karaoke",
            storageBucket: "indeksowe-karaoke.firebasestorage.app",
            messagingSenderId: "456394044590",
            appId: "1:456394044590:web:1978e917b7674e7bd1293f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myPin = localStorage.getItem('dj_pin') || prompt("🔒 Podaj PIN DJ-a:");
        if (myPin) localStorage.setItem('dj_pin', myPin);

        let lastCmdTs = 0;
        let unlockTimeout = null;
        let isPlaying = false; 

        const debugBar = document.getElementById('debugBar');

        // Odbieranie statusu bazy od PC
        db.ref('remote_status').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // Wyświetlanie danych diagnostycznych na żywo
            if (lastCmdTs !== 0) {
                debugBar.innerHTML = 
                    `Wysłano (W telefonie): ${lastCmdTs}<br>` + 
                    `Odebrano (Z komputera): ${data.lastAckTs || 'BRAK'}<br>` + 
                    `Status: ${data.lastAckTs === lastCmdTs ? '✅ ZGODNE (Odlokowano)' : '❌ NIEZGODNE / CZEKAM'}`;
            }

            // NATYCHMIASTOWE ODBLOKOWANIE
            if (data.lastAckTs && data.lastAckTs === lastCmdTs) {
                unlockButtons();
            }

            document.getElementById('uiMode').textContent = data.mode ? `TRYB: ${data.mode.toUpperCase()}` : "";
            document.getElementById('uiSubDisplay').textContent = data.currentName || "Brak utworu";
        });

        // Wysłanie komendy na PC
        function sendCmd(action, value = null) {
            if (!myPin) return;

            if (action === 'play') {
                isPlaying = !isPlaying;
                document.getElementById('btnPlay').textContent = isPlaying ? '⏸️' : '▶️';
            }

            const buttonsIds = ['btnPrev', 'btnPlay', 'btnNext'];
            buttonsIds.forEach(id => {
                const btn = document.getElementById(id);
                if (btn) btn.disabled = true;
            });

            let targetBtn = document.getElementById('btn' + action.charAt(0).toUpperCase() + action.slice(1));
            if (targetBtn) targetBtn.classList.add('pressed');

            // Wysyłamy komendę i zapisujemy jej ID
            lastCmdTs = Date.now();
            
            debugBar.innerHTML = `Wysłano (W telefonie): ${lastCmdTs}<br>Odebrano (Z komputera): CZEKAM...`;

            db.ref('remote_cmd').set({ action: action, value: value, pin: myPin, ts: lastCmdTs })
                .catch(e => { location.reload(); });
            
            if (navigator.vibrate) navigator.vibrate(40);

            clearTimeout(unlockTimeout);
            unlockTimeout = setTimeout(() => {
                debugBar.innerHTML += `<br>⚠️ TIMEOUT (10s) - Wymuszone odblokowanie`;
                unlockButtons();
            }, 10000);
        }

        function unlockButtons() {
            const buttonsIds = ['btnPrev', 'btnPlay', 'btnNext'];
            buttonsIds.forEach(id => {
                const btn = document.getElementById(id);
                if (btn) {
                    btn.disabled = false;
                    btn.classList.remove('pressed');
                }
            });
        }
    </script>
</body>
</html>
