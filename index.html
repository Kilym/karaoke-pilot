<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pilot DJ'a - Karaoke</title>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #000000;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            user-select: none;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        /* Obszar wyświetlania danych (Mega Duży) */
        .status-display {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 10px;
        }

        .mode-label {
            color: #bb86fc;
            font-size: 4vw;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .big-number {
            font-size: 35vw;
            font-weight: 900;
            line-height: 1;
            color: #4CAF50;
            margin: 0;
            text-shadow: 0 0 30px rgba(76, 175, 80, 0.4);
        }

        .huge-title {
            font-size: 10vw;
            /* Bardzo duży tytuł */
            font-weight: bold;
            margin: 10px 0;
            color: #ffffff;
            line-height: 1.1;
            word-wrap: break-word;
            width: 100%;
        }

        .label-small {
            color: #888;
            font-size: 3vw;
            text-transform: uppercase;
            margin-top: 15px;
        }

        .next-song {
            font-size: 5vw;
            color: #03dac6;
            margin-top: 5px;
        }

        /* Kontrolki na dole */
        .bottom-panel {
            padding-bottom: env(safe-area-inset-bottom);
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        .btn {
            background: #1e1e1e;
            border: none;
            color: white;
            padding: 25px 0;
            border-radius: 16px;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.05s;
        }

        .btn:active {
            background: #333;
            transform: scale(0.95);
        }

        .btn-play {
            background: #455a64;
            font-size: 40px;
        }

        .btn-close {
            grid-column: span 3;
            background: #311b92;
            font-size: 16px;
            font-weight: bold;
            padding: 15px;
            color: #ff8a80;
        }
    </style>
</head>

<body>

    <div class="status-display">
        <div id="uiMode" class="mode-label">Inicjalizacja...</div>

        <div id="uiMainDisplay" class="big-number">-</div>

        <div id="uiSubDisplay" class="huge-title">Czekam na dane</div>

        <div id="nextContainer">
            <div class="label-small">Następnie:</div>
            <div id="uiNext" class="next-song">-</div>
        </div>
    </div>

    <div class="bottom-panel">
        <div class="controls-grid">
            <button class="btn" onclick="sendCmd('prev')">⏮️</button>
            <button class="btn btn-play" onclick="sendCmd('play')">⏯️</button>
            <button class="btn" onclick="sendCmd('next')">⏭️</button>

            <button class="btn btn-close" onclick="sendCmd('close')">❌ ZAMKNIJ AKTUALNĄ KARTĘ</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 🔥 KONFIGURACJA FIREBASE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyA7Eam7DIBhHG05gBTNGWuFLs2W8eLfqUo",
            authDomain: "indeksowe-karaoke.firebaseapp.com",
            databaseURL: "https://indeksowe-karaoke-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "indeksowe-karaoke",
            storageBucket: "indeksowe-karaoke.firebasestorage.app",
            messagingSenderId: "456394044590",
            appId: "1:456394044590:web:1978e917b7674e7bd1293f"
        };


        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Elementy UI
        const uiMode = document.getElementById('uiMode');
        const uiMain = document.getElementById('uiMainDisplay');
        const uiSub = document.getElementById('uiSubDisplay');
        const uiNext = document.getElementById('uiNext');
        const nextContainer = document.getElementById('nextContainer');

        let myPin = localStorage.getItem('dj_pin');
        if (!myPin) {
            myPin = prompt("🔒 Podaj PIN DJ-a:");
            if (myPin) localStorage.setItem('dj_pin', myPin);
        }

        // ==========================================
        // 📥 ODBIERANIE DANYCH
        // ==========================================
        db.ref('remote_status').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            uiMode.textContent = data.mode ? `TRYB: ${data.mode.toUpperCase()}` : "";

            if (data.mode === 'konkurs') {
                // Tryb Konkursu: Wielki numer + Tytuł
                uiMain.style.display = 'block';
                uiMain.className = 'big-number';
                uiMain.textContent = data.konkursIndex || "1";

                uiSub.className = 'huge-title';
                uiSub.textContent = data.currentName || "";

                nextContainer.style.display = 'none';
            }
            else if (data.mode === 'loteria') {
                uiMain.style.display = 'none';
                uiSub.className = 'huge-title';
                uiSub.textContent = "LOTERIA";
                nextContainer.style.display = 'none';
            }
            else {
                // Tryb Karaoke: Wielki tytuł na środku
                uiMain.style.display = 'none';
                uiSub.className = 'huge-title';
                uiSub.style.fontSize = '12vw'; // Jeszcze większy w karaoke
                uiSub.textContent = data.currentName || "Brak utworu";

                nextContainer.style.display = 'block';
                uiNext.textContent = data.nextName || "-";
            }
        });

        // ==========================================
        // 📤 WYSYŁANIE KOMEND
        // ==========================================
        function sendCmd(action, value = null) {
            if (!myPin) { location.reload(); return; }
            db.ref('remote_cmd').set({
                action: action,
                value: value,
                pin: myPin,
                ts: Date.now()
            }).catch(e => {
                alert("Błąd PIN!");
                localStorage.removeItem('dj_pin');
                location.reload();
            });
            if (navigator.vibrate) navigator.vibrate(40);
        }
    </script>
</body>

</html>
