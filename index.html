<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pilot Lite - Karaoke</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #000000;
            color: #ffffff;
            margin: 0;
            padding: 0;
            user-select: none;
            display: flex;
            flex-direction: column;
            height: 100dvh;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* EKRAN LOGOWANIA */
        #loginScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #121212;
            z-index: 100000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            border: 1px solid #333;
            text-align: center;
            width: 90%;
            max-width: 350px;
        }

        .login-box h2 {
            color: #bb86fc;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 15px;
            background: #2c2c2c;
            border: 2px solid #444;
            color: #fff;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            text-align: center;
            margin-bottom: 15px;
            outline: none;
        }

        .login-box input:focus {
            border-color: #bb86fc;
        }

        .login-box button {
            width: 100%;
            padding: 15px;
            background: #bb86fc;
            color: #000;
            font-weight: bold;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        .login-box button:active {
            background: #9965f4;
            transform: scale(0.95);
        }

        .login-box button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* --- GÓRNY PASEK ZAKŁADEK I PANELE --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: #111;
            border-bottom: 1px solid #333;
            padding-top: max(10px, env(safe-area-inset-top));
        }

        .top-btn {
            background: #222;
            color: #ccc;
            border: 1px solid #444;
            border-radius: 10px;
            padding: 15px 5px;
            font-size: 20px;
            flex: 1;
            margin: 0 4px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .top-btn.active {
            background: #4CAF50;
            border-color: #4CAF50;
        }

        .logout-btn {
            background: #b71c1c;
            border-color: #b71c1c;
            max-width: 45px;
        }

        .panel {
            background: #1a1a1a;
            padding: 15px;
            margin: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            display: none;
            overflow-y: auto;
            max-height: 65dvh;
        }

        .clickable-item {
            background: #2c2c2c;
            margin-bottom: 8px;
            padding: 15px;
            border-radius: 10px;
            transition: background 0.2s, transform 0.1s;
        }

        .clickable-item.interactive:active {
            transform: scale(0.98);
        }

        .order-title {
            font-size: 16px;
            font-weight: bold;
            line-height: 1.3;
            margin-bottom: 4px;
        }

        .order-singer {
            color: #aaa;
            font-size: 13px;
            display: block;
        }

        .tiny-btn {
            background: #444;
            border: none;
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tiny-btn:disabled {
            opacity: 0.2;
            pointer-events: none;
        }

        /* ------------------------------------------ */

        .status-display {
            flex: 1;
            display: flex;
            flex-direction: column;
            text-align: center;
            padding: 15px;
            padding-bottom: 10px;
            box-sizing: border-box;
            overflow: hidden;
            transition: all 0.3s ease;
            touch-action: pan-y;
        }

        .mode-label {
            color: #bb86fc;
            font-size: 4vw;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            flex-shrink: 0;
        }

        .big-number {
            font-size: 30vw;
            font-weight: 900;
            line-height: 1;
            color: #4CAF50;
            margin: 0;
            text-shadow: 0 0 30px rgba(76, 175, 80, 0.4);
            flex-shrink: 0;
        }

        .huge-title {
            font-size: 10vw;
            font-weight: bold;
            margin: 5px 0;
            color: #ffffff;
            line-height: 1.1;
            word-wrap: break-word;
            width: 100%;
            /* Zabezpieczenie przed wypychaniem kontrolek */
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex-shrink: 0;
        }

        .label-small {
            color: #888;
            font-size: 3.5vw;
            text-transform: uppercase;
            margin-top: 5px;
            font-weight: bold;
        }

        .next-song {
            font-size: 6vw;
            color: #03dac6;
            margin-top: 2px;
            font-weight: bold;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .queue-item {
            font-size: 4.5vw;
            color: #777;
            margin-top: 2px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* KONTROLKI - układ Flex wymuszający bycie na dole */
        #nextKaraokeContainer,
        #nextKonkursContainer {
            width: 100%;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .controls-grid {
            display: grid;
            gap: 10px;
            width: 100%;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            margin-top: auto !important;
            /* Przyklejenie do dołu */
            margin-bottom: 5px;
        }

        .grid-3 {
            grid-template-columns: repeat(3, 1fr);
        }

        .grid-4 {
            grid-template-columns: repeat(4, 1fr);
        }

        .btn {
            background: #333;
            border: none;
            color: white;
            padding: 15px 0;
            border-radius: 12px;
            font-size: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.1s;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .btn-play {
            background: #455a64;
            font-size: 34px;
        }

        .btn-close-tab {
            background: #b71c1c;
            font-size: 24px;
        }

        .btn.pressed {
            background: #e53935 !important;
            transform: scale(0.95);
        }

        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
            background: #222 !important;
            box-shadow: none;
        }

        /* Mały przycisk Reset UI w rogu (PODNIESIONY) */
        .reset-btn-floating {
            position: fixed;
            bottom: 90px;
            /* Przeniesiono wyżej, nad kontrolki sterujące */
            right: 15px;
            width: 50px;
            height: 50px;
            background: rgba(34, 34, 34, 0.9);
            border: 2px solid #555;
            color: #ccc;
            border-radius: 50%;
            font-size: 20px;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
            transition: transform 0.1s, background 0.2s;
        }

        .reset-btn-floating:active {
            transform: scale(0.9);
            background: #444;
        }
    </style>
</head>

<body>

    <div id="loginScreen">
        <div class="login-box">
            <h2>Pilot DJ'a (Lite)</h2>
            <input type="email" id="djEmailInput" placeholder="E-mail DJ-a" autocomplete="username">
            <input type="password" id="djPasswordInput" placeholder="Hasło" autocomplete="current-password">
            <button id="loginBtn" onclick="loginDJ()">Zaloguj się</button>
            <div id="loginError" style="color: #ff5252; margin-top: 15px; font-size: 14px; display: none;">Błędny e-mail
                lub hasło!</div>
        </div>
    </div>

    <div id="appInterface" style="display: none; flex-direction: column; height: 100%;">
        <div id="topBar" class="top-bar">
            <button id="btnTabOrders" class="top-btn" onclick="toggleTab('orders')" title="Zamówienia">📦</button>
            <button id="btnTabList" class="top-btn" onclick="toggleTab('list')" title="Otwarte Karty">📑</button>
            <button id="btnTabHistory" class="top-btn" onclick="toggleTab('history')" title="Historia">📖</button>
            <button class="top-btn logout-btn" onclick="logoutDJ()" title="Wyloguj się">🚪</button>
        </div>

        <div id="tabOrders" class="panel">
            <div id="ordersListRemote" style="text-align: left;">
                <div style="text-align: center; color: #aaa; padding: 20px;">⏳ Czekam na zamówienia...</div>
            </div>
        </div>

        <div id="tabList" class="panel">
            <div id="openTabsContainer" style="text-align: left;">
                <div style="text-align: center; color: #aaa; padding: 20px;">⏳ Oczekiwanie na dane z przeglądarki...
                </div>
            </div>
        </div>

        <div id="tabHistory" class="panel">
            <div id="historyListRemote" style="text-align: left;">
                <div style="text-align: center; color: #aaa; padding: 20px;">⏳ Czekam na historię...</div>
            </div>
        </div>

        <div class="status-display" id="mainStatusScreen">
            <div id="uiMode" class="mode-label">Inicjalizacja...</div>
            <div id="uiMainDisplay" class="big-number">-</div>
            <div id="uiSubDisplay" class="huge-title">Czekam na dane</div>

            <div id="nextKaraokeContainer" style="display: none;">
                <div style="flex-shrink: 0;">
                    <div class="label-small">Następnie:</div>
                    <div id="uiNext" class="next-song">-</div>
                    <div class="label-small">W kolejce:</div>
                    <div id="uiQueue" style="margin-top:5px; margin-bottom: 5px;"></div>
                </div>

                <div class="controls-grid grid-4">
                    <button id="btnPrev" class="btn" onclick="sendCmd('prev')">⏮️</button>
                    <button id="btnPlay" class="btn btn-play" onclick="sendCmd('play')">▶️</button>
                    <button id="btnNext" class="btn" onclick="sendCmd('next')">⏭️</button>
                    <button id="btnClose" class="btn btn-close-tab" onclick="sendCmd('close')"
                        title="Zamknij Kartę">✖</button>
                </div>
            </div>

            <div id="nextKonkursContainer" style="display: none; border-top: 1px solid #333; padding-top: 10px;">
                <div style="flex-shrink: 0;">
                    <div class="label-small">Następny w kolejce:</div>
                    <div
                        style="display: flex; align-items: center; justify-content: center; gap: 15px; margin-top: 5px;">
                        <span id="uiNextIdx" style="font-size: 10vw; font-weight: 900; color: #fb8c00;">-</span>
                        <span id="uiNextName"
                            style="font-size: 6vw; color: #aaa; text-align: left; flex: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">-</span>
                    </div>
                </div>

                <div class="controls-grid grid-3">
                    <button id="btnPrevK" class="btn" onclick="sendCmd('prev')">⏮️</button>
                    <button id="btnPlayK" class="btn btn-play" onclick="sendCmd('play')">▶️</button>
                    <button id="btnNextK" class="btn" onclick="sendCmd('next')">⏭️</button>
                </div>
            </div>

            <div id="loteriaContainer" style="display: none; width: 100%; margin-top: 10px;">
                <button class="btn"
                    style="background: #9c27b0; font-weight: bold; width: 100%; padding: 15px; font-size: 18px; margin-bottom: 10px; box-shadow: 0 4px 15px rgba(156, 39, 176, 0.4); text-transform: uppercase;"
                    onclick="sendCmd('open_lottery_window')">🖥️ Otwórz / Zamknij Ekran</button>
                <button class="btn"
                    style="background: #3f51b5; font-weight: bold; width: 100%; padding: 15px; font-size: 18px; margin-bottom: 10px; box-shadow: 0 4px 15px rgba(63, 81, 181, 0.4); text-transform: uppercase;"
                    onclick="sendCmd('show_lottery_screen')">📺 Wyślij na ekran (bez losowania)</button>
                <button class="btn"
                    style="background: #e91e63; font-weight: bold; width: 100%; padding: 20px; font-size: 24px; box-shadow: 0 4px 15px rgba(233, 30, 99, 0.4); text-transform: uppercase;"
                    onclick="sendCmd('start_lottery')">🎉 Losuj Zwycięzcę</button>
                <div class="label-small" style="margin-top: 25px; text-align: center; color: #bbb;">🏆 Ostatni
                    Zwycięzcy:</div>
                <ul id="winnersListRemote"
                    style="list-style: none; padding: 0; margin-top: 10px; max-height: 25dvh; overflow-y: auto; text-align: left;">
                    <li style="text-align: center; color: #777; padding: 10px;">Czekam na dane...</li>
                </ul>
            </div>
        </div>

        <button class="reset-btn-floating" onclick="forceUnlockUI()" title="Wymuś zresetowanie blokady UI">
            🔄
        </button>
    </div>

    <script>
        // --- KONFIGURACJA FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyA7Eam7DIBhHG05gBTNGWuFLs2W8eLfqUo",
            authDomain: "indeksowe-karaoke.firebaseapp.com",
            databaseURL: "https://indeksowe-karaoke-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "indeksowe-karaoke",
            storageBucket: "indeksowe-karaoke.firebasestorage.app",
            messagingSenderId: "456394044590",
            appId: "1:456394044590:web:1978e917b7674e7bd1293f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let appInitialized = false;

        // Nasłuchiwanie zmian stanu logowania
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appInterface').style.display = 'flex';
                if (!appInitialized) {
                    initApp();
                    appInitialized = true;
                }
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('appInterface').style.display = 'none';
                appInitialized = false;
            }
        });

        // Funkcja logowania e-mailem i hasłem
        async function loginDJ() {
            const email = document.getElementById('djEmailInput').value.trim();
            const pass = document.getElementById('djPasswordInput').value;
            const errorDiv = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            if (!email || !pass) return;

            btn.disabled = true;
            btn.textContent = "Logowanie...";
            errorDiv.style.display = "none";

            try {
                await auth.signInWithEmailAndPassword(email, pass);
                btn.disabled = false;
                btn.textContent = "Zaloguj się";
            } catch (err) {
                errorDiv.style.display = "block";
                btn.disabled = false;
                btn.textContent = "Zaloguj się";
                console.error(err);
            }
        }

        // Funkcja wylogowywania
        function logoutDJ() {
            auth.signOut().then(() => {
                location.reload();
            });
        }

        let lastCmdTs = 0; let unlockTimeout = null; let isPlaying = false; let waitingForSongChange = false;
        let lastSongName = ""; let isEmptyTitle = true; let currentModeInternal = "karaoke";

        let touchStartX = 0; let touchEndX = 0;

        const uiMode = document.getElementById('uiMode'); const uiMain = document.getElementById('uiMainDisplay');
        const uiSub = document.getElementById('uiSubDisplay'); const uiNext = document.getElementById('uiNext');
        const uiQueue = document.getElementById('uiQueue'); const nextKaraokeContainer = document.getElementById('nextKaraokeContainer');
        const nextKonkursContainer = document.getElementById('nextKonkursContainer'); const loteriaContainer = document.getElementById('loteriaContainer');

        const statusScreen = document.getElementById('mainStatusScreen');
        const availableModes = ['karaoke', 'konkurs', 'loteria'];

        statusScreen.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX, { passive: true });
        statusScreen.addEventListener('touchend', e => { touchEndX = e.changedTouches[0].screenX; handleSwipe(); });

        function handleSwipe() {
            const threshold = 80;
            let currentIndex = availableModes.indexOf(currentModeInternal);
            if (currentIndex === -1) currentIndex = 0;

            if (touchEndX < touchStartX - threshold) {
                let nextMode = availableModes[(currentIndex + 1) % availableModes.length];
                sendCmd('set_mode', nextMode); toggleTab('main');
            } else if (touchEndX > touchStartX + threshold) {
                let prevMode = availableModes[(currentIndex - 1 + availableModes.length) % availableModes.length];
                sendCmd('set_mode', prevMode); toggleTab('main');
            }
        }

        function toggleTab(tabName) {
            const tabs = ['orders', 'list', 'history'];
            tabs.forEach(t => {
                const el = document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1));
                const btn = document.getElementById('btnTab' + t.charAt(0).toUpperCase() + t.slice(1));
                if (t === tabName) {
                    const isVisible = el.style.display === 'block';
                    el.style.display = isVisible ? 'none' : 'block';
                    if (btn) btn.classList.toggle('active', !isVisible);
                } else {
                    if (el) el.style.display = 'none';
                    if (btn) btn.classList.remove('active');
                }
            });
        }

        function initApp() {
            // Nasłuchiwanie Zamówień
            db.ref('zamowienia').on('value', snap => {
                const data = snap.val() || {};
                const list = document.getElementById('ordersListRemote');
                const now = Date.now();
                const eightHoursInMs = 8 * 60 * 60 * 1000;
                let uniqueOrders = {};

                Object.keys(data).forEach(key => {
                    let o = data[key];
                    o.id = key;
                    if ((now - o.timestamp) <= eightHoursInMs) {
                        let lowerTitle = o.tytul.toLowerCase().trim();
                        if (!uniqueOrders[lowerTitle] || !o.zagrane) {
                            uniqueOrders[lowerTitle] = o;
                        }
                    }
                });

                if (list) {
                    list.innerHTML = '';
                    let orderCount = 0;
                    Object.values(uniqueOrders).forEach(o => {
                        orderCount++;
                        const card = document.createElement('div');
                        card.className = 'clickable-item interactive';
                        const isPlayed = o.zagrane === true;
                        card.style.background = isPlayed ? '#fbc02d' : '#ffffff';
                        card.style.border = isPlayed ? '2px solid #f57f17' : '2px solid #ccc';
                        card.style.color = '#000000';
                        const nat = o.narodowosc ? ` | 🌍 ${o.narodowosc}` : '';

                        card.innerHTML = `
                            <div class="order-title" style="color: #000; font-weight: 900;">${o.tytul}</div>
                            <span class="order-singer" style="color: #444; font-weight: bold;">🎤 ${o.imie || 'Wybór własny'}${nat}</span>
                        `;

                        // Zapamiętanie oryginalnego wyglądu kafelka
                        const originalHTML = card.innerHTML;
                        const originalBg = card.style.background;

                        card.onclick = () => {
                            sendCmd('play_order', o.tytul);
                            card.style.background = '#1b5e20';
                            card.innerHTML = `<div class="order-title" style="color: #fff; font-weight: 900;">Wysyłanie...</div>`;

                            // Przywrócenie pierwotnego wyglądu kafelka po 800ms
                            setTimeout(() => {
                                card.style.background = originalBg;
                                card.innerHTML = originalHTML;
                            }, 800);

                            // Zamknięcie zakładki
                            setTimeout(() => { toggleTab('orders'); }, 900);
                        };
                        list.appendChild(card);
                    });
                    if (orderCount === 0) list.innerHTML = '<div style="text-align: center; color: #aaa; padding: 20px;">📭 Brak zamówień z ostatnich 8 godzin.</div>';
                }
            });

            // Nasłuchiwanie Historii (Ostatnie 24H)
            const cutoff = Date.now() - (24 * 60 * 60 * 1000);
            db.ref('historia').orderByChild('timestamp').startAt(cutoff).on('value', snap => {
                const data = [];
                snap.forEach(child => { data.push(child.val()); });
                data.reverse(); // od najnowszych
                const list = document.getElementById('historyListRemote');
                if (list) {
                    list.innerHTML = '';
                    if (data.length === 0) {
                        list.innerHTML = '<div style="text-align: center; color: #aaa; padding: 20px;">Brak wpisów z ostatnich 24h.</div>';
                        return;
                    }
                    data.forEach(item => {
                        list.innerHTML += `
                        <div style="background: #2c2c2c; margin-bottom: 6px; padding: 12px; border-radius: 8px;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                                <span style="font-size: 11px; color: #888; font-weight: bold;">${item.time}</span>
                            </div>
                            <div style="font-weight: bold; font-size: 14px; color: #fff; margin-bottom: 4px;">${item.title}</div>
                            <div style="font-size: 12px; color: #aaa;">🎤 ${item.singers || 'Wybór własny'}</div>
                        </div>`;
                    });
                }
            });

            // Odbiór statusu od DJ'a
            db.ref('remote_status').on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                if (data.mode) currentModeInternal = data.mode;
                
                // UŻYCIE ZBEZPIECZONEJ FUNKCJI RENDEROWANIA
                renderOpenTabsList(data.openTabs);

                const newTitle = data.currentName || "-";
                // Definicja "pustej" karty - weryfikujemy w obu trybach
                isEmptyTitle = (newTitle === "-" || newTitle === "Brak utworu" || newTitle === "Brak aktywnej karty");

                if (waitingForSongChange) {
                    if (newTitle !== lastSongName) { waitingForSongChange = false; unlockButtons(); }
                } else if (data.lastAckTs && data.lastAckTs === lastCmdTs) {
                    unlockButtons();
                }

                uiMode.textContent = data.mode ? `TRYB: ${data.mode.toUpperCase()}` : "";

                if (data.mode === 'karaoke') {
                    uiMain.style.display = 'none'; uiSub.textContent = newTitle; uiSub.style.fontSize = '12vw';
                    nextKaraokeContainer.style.display = 'flex'; nextKonkursContainer.style.display = 'none'; loteriaContainer.style.display = 'none';
                    uiNext.textContent = data.nextName || "-";
                    uiQueue.innerHTML = '';
                    
                    // BEZPIECZNE POBIERANIE KOLEJKI
                    const safeQueue = Array.isArray(data.queueList) ? data.queueList : Object.values(data.queueList || {});
                    safeQueue.forEach(song => {
                        const div = document.createElement('div'); div.className = 'queue-item'; div.textContent = song; uiQueue.appendChild(div);
                    });
                }
                else if (data.mode === 'konkurs') {
                    uiMain.style.display = 'block'; uiMain.textContent = data.konkursIndex || "1";
                    uiSub.textContent = newTitle; uiSub.style.fontSize = '8vw';
                    nextKaraokeContainer.style.display = 'none'; nextKonkursContainer.style.display = 'flex'; loteriaContainer.style.display = 'none';
                    document.getElementById('uiNextIdx').textContent = data.nextKonkursIndex || "-";
                    document.getElementById('uiNextName').textContent = data.nextName || "-";
                }
                else if (data.mode === 'loteria') {
                    uiMain.style.display = 'none'; uiSub.textContent = "LOSOWANIE"; uiSub.style.fontSize = '11vw';
                    nextKaraokeContainer.style.display = 'none'; nextKonkursContainer.style.display = 'none'; loteriaContainer.style.display = 'block';

                    const winnersList = document.getElementById('winnersListRemote'); winnersList.innerHTML = '';
                    
                    // BEZPIECZNE POBIERANIE ZWYCIĘZCÓW
                    const safeWinners = Array.isArray(data.winners) ? data.winners : Object.values(data.winners || {});
                    if (safeWinners.length > 0) {
                        safeWinners.forEach(w => {
                            winnersList.innerHTML += `
                                <li style="background: #2c2c2c; margin-bottom: 8px; padding: 12px; border-radius: 8px; border-left: 4px solid #e91e63;">
                                    <div style="font-weight: bold; font-size: 18px; color: #fff;">${w.name}</div>
                                    <div style="color: #aaa; font-size: 14px; margin-top: 4px;">Zgłoszenie: <b style="color:#e91e63;">${w.code}</b></div>
                                </li>`;
                        });
                    } else {
                        winnersList.innerHTML = '<li style="text-align: center; color: #777; padding: 10px;">Brak zwycięzców w tej sesji</li>';
                    }
                }
            });
        } // End initApp

        // ZABEZPIECZONA FUNKCJA RENDEROWANIA KART
        function renderOpenTabsList(rawTabs) {
            const container = document.getElementById('openTabsContainer');
            if (!container) return;
            
            // Konwersja obiektu na tablicę, jeśli Firebase po drodze zgubił strukturę
            const safeTabs = Array.isArray(rawTabs) ? rawTabs : Object.values(rawTabs || {});

            if (safeTabs.length === 0) { 
                container.innerHTML = '<div style="text-align: center; color: #aaa; padding: 20px;">Brak otwartych kart z muzyką.</div>'; 
                return; 
            }

            let html = '';
            safeTabs.forEach((t, i) => {
                html += `
                <div style="background: #2c2c2c; margin-bottom: 6px; padding: 8px 10px; border-radius: 8px; display:flex; align-items:center; gap: 10px;">
                    <div style="display:flex; flex-direction:column; gap: 3px;">
                        <button class="tiny-btn" onclick="sendCmd('move_tab', {id: ${t.id}, dir: -1})" ${i === 0 ? 'disabled' : ''} title="Wyżej">▲</button>
                        <button class="tiny-btn" onclick="sendCmd('move_tab', {id: ${t.id}, dir: 1})" ${i === safeTabs.length - 1 ? 'disabled' : ''} title="Niżej">▼</button>
                    </div>
                    <div style="flex:1; word-break: break-word; white-space: normal; font-size:13px; font-weight:bold; line-height: 1.2;">${t.title}</div>
                    <button class="tiny-btn" style="background:#4CAF50; padding:10px 10px; font-size:16px;" onclick="sendCmd('move_tab_top', ${t.id})" ${i === 0 ? 'disabled' : ''} title="Przesuń na samą górę">⏫</button>
                    <button style="background:#d32f2f; border:none; color:white; padding:10px 12px; border-radius:6px; font-weight:bold; font-size:14px; cursor:pointer;" onclick="sendCmd('close_tab', ${t.id})" title="Zamknij">✖</button>
                </div>`;
            });
            container.innerHTML = html;
        }

        function sendCmd(action, value = null) {
            const user = auth.currentUser;
            if (!user) { location.reload(); return; }

            if (action === 'play' && isEmptyTitle) return;

            if (action === 'play') {
                isPlaying = !isPlaying;
                const btnPlay = document.getElementById('btnPlay'); const btnPlayK = document.getElementById('btnPlayK');
                if (btnPlay && !isEmptyTitle) btnPlay.textContent = isPlaying ? '⏸️' : '▶️';
                if (btnPlayK && !isEmptyTitle) btnPlayK.textContent = isPlaying ? '⏸️' : '▶️';
            }
            else if (action === 'close' || action === 'prev' || action === 'next' || action === 'play_order') {
                isPlaying = false;
                const btnPlay = document.getElementById('btnPlay'); const btnPlayK = document.getElementById('btnPlayK');
                if (btnPlay) btnPlay.textContent = '▶️';
                if (btnPlayK) btnPlayK.textContent = '▶️';
            }

            const buttonsIds = ['btnPrev', 'btnPlay', 'btnNext', 'btnClose', 'btnPrevK', 'btnPlayK', 'btnNextK'];
            if (action === 'prev' || action === 'next' || action === 'play' || action === 'close') {
                buttonsIds.forEach(id => { const btn = document.getElementById(id); if (btn) btn.disabled = true; });
            }

            let targetBtn1 = document.getElementById('btn' + action.charAt(0).toUpperCase() + action.slice(1));
            let targetBtn2 = document.getElementById('btn' + action.charAt(0).toUpperCase() + action.slice(1) + 'K');
            if (targetBtn1) targetBtn1.classList.add('pressed'); if (targetBtn2) targetBtn2.classList.add('pressed');

            lastCmdTs = Date.now();

            if (action === 'prev' || action === 'next' || action === 'play_order') {
                waitingForSongChange = true; lastSongName = uiSub.textContent;
                clearTimeout(unlockTimeout); unlockTimeout = setTimeout(() => { waitingForSongChange = false; unlockButtons(); }, 4000);
            } else {
                waitingForSongChange = false; clearTimeout(unlockTimeout); unlockTimeout = setTimeout(unlockButtons, 1500);
            }

            db.ref('remote_cmd').set({ action: action, value: value, dj: user.email, ts: lastCmdTs }).catch(e => { console.error(e); });
            if (navigator.vibrate) navigator.vibrate(40);
        }

        function unlockButtons() {
            ['btnPrev', 'btnPlay', 'btnNext', 'btnClose', 'btnPrevK', 'btnPlayK', 'btnNextK'].forEach(id => {
                let btn = document.getElementById(id);
                if (btn) {
                    if ((id === 'btnPlay' || id === 'btnPlayK') && isEmptyTitle) {
                        btn.disabled = true;
                        btn.textContent = '-';
                        btn.classList.remove('pressed');
                    }
                    else if (id.includes('Play') || id.includes('Close')) {
                        btn.disabled = false; btn.classList.remove('pressed');
                        if (id === 'btnPlay' || id === 'btnPlayK') { btn.textContent = isPlaying ? '⏸️' : '▶️'; }
                    } else {
                        btn.disabled = isPlaying; btn.classList.remove('pressed');
                    }
                }
            });
        }

        function forceUnlockUI() {
            waitingForSongChange = false; isPlaying = false;
            const btnPlay = document.getElementById('btnPlay'); const btnPlayK = document.getElementById('btnPlayK');
            if (btnPlay) btnPlay.textContent = isEmptyTitle ? '-' : '▶️';
            if (btnPlayK) btnPlayK.textContent = isEmptyTitle ? '-' : '▶️';
            unlockButtons(); if (navigator.vibrate) navigator.vibrate(20);
        }
    </script>
</body>
